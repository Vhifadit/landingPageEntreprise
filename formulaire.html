<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prendre Rendez-vous | MEB</title>
    <link rel="stylesheet" href="style.css"> <style>
        .form-container {
            max-width: 600px;
            margin: 5rem auto;
            padding: 2rem;
            background: var(--blanc);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 5px solid var(--vert-principal);
        }
        h2 { color: var(--vert-principal); margin-bottom: 1.5rem; }
        
        .form-group { margin-bottom: 1.2rem; }
        
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dark); font-weight: 600; }
        
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--gris);
            border-radius: 8px;
            font-family: inherit;
        }

        input:focus { border-color: var(--vert-principal); outline: none; }

        .btn-submit {
            background: var(--jaune-prime);
            color: var(--vert-principal);
            border: none;
            padding: 1rem 2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-submit:hover { background: var(--vert-principal); color: white; }
    </style>
</head>
<body>
   
    <section class="form-container">
         <div style="margin-bottom: 20px;">
            <a href="index.html" style="text-decoration: none; color: #027a1c; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                <span>←</span> Retour à l'accueil
            </a>
        </div>

        <h2>📅 Prenez rendez-vous</h2>
        <form action="" method="POST">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" placeholder="Ex: Jean Koffi" name="nom" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com"  name="email">
            </div>
            <div class="form-group">
                <label>Votre projet</label>
                <select name="projet">
                    <option>Accompagnement Startup</option>
                    <option>Artisanat / Innovation</option>
                    <option>Conseil Juridique</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="4" name="message" placeholder="Décrivez brièvement votre besoin..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Envoyer la demande</button>
        </form>
    </section>

</body>
</html>
